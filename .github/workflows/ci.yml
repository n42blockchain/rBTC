name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: dtolnay/rust-toolchain@8641a17e25bf5b40c118d48fe0f81e8655731839 # 1.85.0
        with:
          toolchain: 1.85.0
          components: rustfmt, clippy, llvm-tools-preview
      - run: cargo fmt --check
      - run: cargo fmt --manifest-path fuzz/Cargo.toml --check
      - run: bash -n scripts/*.sh
      - run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - run: cargo test --locked --all-features
      - uses: taiki-e/install-action@c44f6b046f1c29ae5918b1e0bfdbb2f1813836fd # v2.84.1
        with:
          tool: cargo-llvm-cov@0.8.7
      - run: cargo llvm-cov --locked --all-features --lcov --output-path lcov.info --fail-under-lines 90
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: lcov-report
          path: lcov.info
          if-no-files-found: error

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: dtolnay/rust-toolchain@8641a17e25bf5b40c118d48fe0f81e8655731839 # 1.85.0
        with:
          toolchain: 1.85.0
      - uses: taiki-e/install-action@c44f6b046f1c29ae5918b1e0bfdbb2f1813836fd # v2.84.1
        with:
          tool: cargo-audit@0.22.2,cargo-deny@0.20.2,cargo-cyclonedx@0.5.9
      - run: cargo audit --deny warnings
      - run: cargo audit --deny warnings --file fuzz/Cargo.lock
      - run: cargo deny check
      - run: cargo deny --manifest-path fuzz/Cargo.toml --config deny.toml check
      - name: Generate CycloneDX SBOM
        run: SOURCE_DATE_EPOCH="$(git log -1 --pretty=%ct)" cargo cyclonedx --all-features --format json --spec-version 1.5 --override-filename rbtc.cdx
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cyclonedx-sbom
          path: rbtc.cdx.json
          if-no-files-found: error
