name: Dynamic analysis

on:
  workflow_dispatch:
  schedule:
    - cron: "29 2 * * 3"

permissions:
  contents: read

jobs:
  miri:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: dtolnay/rust-toolchain@4fd1da8b0805d2d2e936788875a7d65dbd677dc2 # nightly-2026-07-13
        with:
          toolchain: nightly-2026-07-13
          components: miri, rust-src
      - run: cargo miri test --locked --lib merkle_proof::tests::verifies_left_and_right_transaction_positions
      - run: cargo miri test --locked --lib p2p::tests::v1_verack_roundtrip
      - run: cargo miri test --locked --lib headers::tests::accepts_regtest_child_and_selects_best_work_tip

  address-sanitizer:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RUSTFLAGS: -Zsanitizer=address
      RUSTDOCFLAGS: -Zsanitizer=address
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: dtolnay/rust-toolchain@4fd1da8b0805d2d2e936788875a7d65dbd677dc2 # nightly-2026-07-13
        with:
          toolchain: nightly-2026-07-13
          components: rust-src
      - run: cargo test --locked --all-features --lib -Zbuild-std --target x86_64-unknown-linux-gnu
