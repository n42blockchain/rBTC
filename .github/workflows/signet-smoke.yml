name: Signet sync smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: read

concurrency:
  group: signet-sync-smoke
  cancel-in-progress: false

jobs:
  height-one-thousand:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: dtolnay/rust-toolchain@8641a17e25bf5b40c118d48fe0f81e8655731839 # 1.85.0
        with:
          toolchain: 1.85.0
      - run: scripts/signet-sync-smoke.sh
