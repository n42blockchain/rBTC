name: Release hard gates

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  reproducible-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@8641a17e25bf5b40c118d48fe0f81e8655731839 # 1.85.0
        with:
          toolchain: 1.85.0
      - uses: taiki-e/install-action@c44f6b046f1c29ae5918b1e0bfdbb2f1813836fd # v2.84.1
        with:
          tool: cargo-cyclonedx@0.5.9
      - run: scripts/verify-reproducible-build.sh
      - name: Assemble release evidence
        run: |
          mkdir -p dist
          cp target/release/rbtcd dist/rbtcd-x86_64-unknown-linux-gnu
          SOURCE_DATE_EPOCH="$(git log -1 --pretty=%ct)" cargo cyclonedx --all-features --format json --spec-version 1.5 --override-filename rbtc.cdx
          mv rbtc.cdx.json dist/
          cd dist
          sha256sum rbtcd-x86_64-unknown-linux-gnu rbtc.cdx.json > SHA256SUMS
      - name: Attest release provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: |
            dist/rbtcd-x86_64-unknown-linux-gnu
            dist/SHA256SUMS
      - name: Attest release SBOM
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: dist/rbtcd-x86_64-unknown-linux-gnu
          sbom-path: dist/rbtc.cdx.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rbtc-linux-release-evidence
          path: dist/
          if-no-files-found: error
