[graph]
all-features = true

[advisories]
ignore = []

[licenses]
allow = [
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "GPL-3.0-only",
    "ISC",
    "MIT",
    "MITNFA",
    "MPL-2.0",
    "Unicode-3.0",
]
confidence-threshold = 0.8
exceptions = [
    { allow = ["NCSA"], crate = "libfuzzer-sys@0.4.13" },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
